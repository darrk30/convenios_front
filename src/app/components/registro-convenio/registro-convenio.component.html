<main class="container-fluid p-4">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
    <nav aria-label="breadcrumb" class="ms-md-auto mt-2 mt-md-0">
      <ol class="breadcrumb small bg-transparent p-0 mb-0">
        <li class="breadcrumb-item"><a class="text-decoration-none text-secondary" href="#">Inicio</a></li>
        <li class="breadcrumb-item"><a class="text-decoration-none text-secondary" href="#">Convenios Interinstitucionales</a></li>
        <li aria-current="page" class="breadcrumb-item active text-primary">Nuevo</li>
      </ol>
    </nav>
  </div>
  <section class="card shadow-sm">
    <h4 class="card-header" style="background-color: lightgray;">Registro de Convenio Interinstitucional</h4>
    <div class="card-body p-3 p-sm-4">
      <div class="step-indicator mb-4">
        <div (click)="this.stepConv.setStepConv(1)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 1}" data-target="#datos-convenio">
            <div class="step-icon"><span class="material-icons">description</span></div>
            <div class="step-text">DATOS DEL CONVENIO</div>
        </div>
        <div (click)="this.stepConv.setStepConv(2)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 2}" data-target="#datos-itp">
            <div class="step-icon"><span class="material-icons">work</span></div>
            <div class="step-text">DATOS DEL ITP</div>
        </div>
        <div (click)="this.stepConv.setStepConv(3)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 3}" data-target="#contrapartes">
            <div class="step-icon"><span class="material-icons">group</span></div>
            <div class="step-text">CONTRAPARTES</div>
        </div>
        <div (click)="this.stepConv.setStepConv(4)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 4}" data-target="#evaluacion-anual">
            <div class="step-icon"><span class="material-icons">assessment</span></div>
            <div class="step-text">EVALUACIÓN ANUAL</div>
        </div>
        <div (click)="this.stepConv.setStepConv(5)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 5, 'disabled': datosConvServ.getReqPlanTrabajo()}" data-target="#plan-trabajo">
            <div class="step-icon"><span class="material-icons">assignment</span></div>
            <div class="step-text">PLAN DE TRABAJO</div>
        </div>
        <div (click)="this.stepConv.setStepConv(6)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 6}" data-target="#evaluacion-anualpt">
            <div class="step-icon"><span class="material-icons">grading</span></div>
            <div class="step-text">EVALUACIÓN ANUAL PT</div>
        </div>
        <div (click)="this.stepConv.setStepConv(7)" class="step" [ngClass]="{'active':this.stepConv.getCurrentStepConv() === 7  }" data-target="#adjuntar-archivo">
            <div class="step-icon"><span class="material-icons">attach_file</span></div>
            <div class="step-text">ADJUNTAR ARCHIVOS</div>
        </div>
      </div>
      <div class="d-flex flex-column">
        <div class="tab-content">
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 1">
            <app-datos-convenio></app-datos-convenio>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 2">
            <app-datos-itp></app-datos-itp>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 3">
            <app-contrapartes></app-contrapartes>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 4">
            <app-evaluacion-anual></app-evaluacion-anual>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 5">
            <app-plan-trabajo></app-plan-trabajo>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 6">
            <app-eval-anual-pt></app-eval-anual-pt>
          </ng-container>
          <ng-container *ngIf="this.stepConv.getCurrentStepConv() === 7">
            <app-adjuntar-archivos></app-adjuntar-archivos>
          </ng-container>
        </div>

      </div>
    </div>
  </section>
</main>
