<div class="account-pages my-5 pt-sm-5">
	<div class="container" >
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-6 col-xl-5">
				<div class="card overflow-hidden">
					<div class="" style="background-color: #6F6F6F;">
						<div class="row">
							<div class="col-7">
								<div class="text-primary p-4">
									<h5 class="text-white">ITP - Convenios - {{year}}</h5>
                    				<p class="text-white">Iniciar sesión</p>
								</div>
							</div>
						</div>
					</div>
					<div class="card-body pt-0">
						<div>
							<a routerLink="/">
								<div class="avatar-md profile-user-wid mb-4">
									<span class="avatar-title rounded-circle bg-light">
										<img src="../../../assets/images/login-itp.png" alt="" class="rounded-circle" height="34">
									</span>
								</div>
							</a>
						</div>
						<div class="p-2">
                            <div class="mt-3 d-grid">
                                <button class="btn btn-danger" (click)="login()" [disabled]="!isReady">Iniciar Sesión</button>
                            </div>
						</div>
						<div class="p-2 mt-3 text-center">
								<a class="link-info" href="/assets/documents/manual-usuario.pdf">
									<i class="bx bxs-file-pdf fs-1 align-middle me-1"></i>
									<span class="fs-5"> Manual de Usuario </span>
								</a>
						</div>						
						<div *ngIf="showAccessDenied" class="alert alert-danger mt-2" role="alert">
							<strong>Acceso denegado:</strong> Su usuario no tiene permisos para ingresar a esta aplicación.
						</div>
					</div>
				</div>
				<div class="mt-5 text-center">
					<p>© {{year}} ITP - Convenios</p>
				</div>

			</div>
		</div>
	</div>

  <!-- end container -->
</div>
<!-- end page -->
